"$schema" = 'https://starship.rs/config-schema.json'

# フォーマット: 1行目にディレクトリ・Git情報・右端に時刻、2行目にプロンプト記号
format = """
$directory$git_branch$git_status\
$line_break\
$character"""

right_format = "$time"

# ディレクトリ: フルパス表示
[directory]
truncation_length = 0
truncate_to_repo = false

# Git ブランチ
[git_branch]
symbol = " "

# Git ステータス
[git_status]

# プロンプト記号: 成功=緑、エラー=赤
[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

# 右端に時刻表示
[time]
disabled = false
format = "[$time]($style)"

# --- Claude Codeと干渉するモジュールを無効化 ---
